<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Bejelentkezés</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow" style="width: 400px;">

        <h3 class="text-center mb-3">🏠 Ingatlan App</h3>
        <h5 class="text-center mb-4">Bejelentkezés</h5>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <input type="text" name="username" class="form-control" placeholder="Felhasználónév">
            </div>

            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="Jelszó">
            </div>

            <button type="submit" class="btn btn-primary w-100">Bejelentkezés</button>
        </form>

        <p class="text-center mt-3">
            Nincs fiókod?
            <a href="{% url 'register' %}">Regisztráció</a>
        </p>

    </div>
</div>

</body>
</html>
