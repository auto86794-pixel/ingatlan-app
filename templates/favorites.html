<!DOCTYPE html>
<html>
<head>
    <title>Kedvencek</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <h1 class="mb-4">❤️ Kedvenc ingatlanok</h1>

    <a href="/" class="btn btn-secondary mb-3">← Vissza</a>

    <div class="row">

        {% for listing in listings %}
        <div class="col-md-4 mb-4">

            <div class="card shadow-sm">

                {% if listing.image %}
                <img src="{{ listing.image }}" class="card-img-top" style="height:200px; object-fit:cover;">
                {% endif %}

                <div class="card-body">
                    <h5>{{ listing.title }}</h5>
                    <p>{{ listing.city }}</p>
                    <p class="text-success">{{ listing.price }} Ft</p>
                </div>

            </div>

        </div>
        {% empty %}
        <p>Nincs kedvenc 😢</p>
        {% endfor %}

    </div>

</div>

</body>
</html>
