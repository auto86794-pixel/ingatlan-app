<!DOCTYPE html>
<html>
<head>
    <title>Új hirdetés</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #eef2f3, #ffffff);
        }

        .card {
            border-radius: 20px;
        }
    </style>
</head>

<body>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow p-4">

                <h3 class="text-center mb-4">➕ Új hirdetés</h3>

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Cím</label>
                        {{ form.title }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Város</label>
                        {{ form.city }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Ár</label>
                        {{ form.price }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Méret (m²)</label>
                        {{ form.size }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Szobák</label>
                        {{ form.rooms }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Leírás</label>
                        {{ form.description }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Kép URL</label>
                        {{ form.image }}
                    </div>

                    <button class="btn btn-success w-100">
                        💾 Mentés
                    </button>

                </form>

                <a href="/profile/" class="btn btn-secondary mt-3">
                    ⬅ Vissza a profilhoz
                </a>

            </div>

        </div>
    </div>
</div>

</body>
</html>
