<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Új ingatlan</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow" style="width: 500px;">

        <h3 class="text-center mb-3">🏠 Új ingatlan</h3>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <!-- Cím -->
            <div class="mb-3">
                <input type="text" name="title" class="form-control" placeholder="Cím">
            </div>

            <!-- Leírás -->
            <div class="mb-3">
                <textarea name="description" class="form-control" placeholder="Leírás"></textarea>
            </div>

            <!-- Ár -->
            <div class="mb-3">
                <input type="number" name="price" class="form-control" placeholder="Ár">
            </div>

            <!-- Kép -->
            <div class="mb-3">
                <input type="file" name="image" class="form-control">
            </div>

            <button type="submit" class="btn btn-primary w-100">Mentés</button>
        </form>

        <a href="/" class="btn btn-link mt-3 text-center">← Vissza</a>

    </div>
</div>

</body>
</html>
